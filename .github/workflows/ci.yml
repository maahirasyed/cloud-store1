name: CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Build Backend
        run: docker build -t ecommerce-backend ./backend

      - name: Build Frontend
        run: docker build -t ecommerce-frontend ./frontend

      - name: Start MySQL
        run: |
          docker run -d --name mysql \
            -e MYSQL_ROOT_PASSWORD=root \
            -e MYSQL_DATABASE=ecommerce \
            -p 3307:3306 mysql:8
          sleep 20

      - name: Init DB
        run: |
          docker exec -i mysql mysql -uroot -proot <<EOF
          USE ecommerce;
          CREATE TABLE IF NOT EXISTS products (
            id INT AUTO_INCREMENT PRIMARY KEY,
            name VARCHAR(255),
            price INT,
            image VARCHAR(500)
          );
          INSERT INTO products (name, price, image)
          VALUES ('CI Product', 1000, 'https://via.placeholder.com/200');
          EOF

      - name: Run Backend
        run: |
          docker run -d --name backend \
            --link mysql:mysql \
            -p 3000:3000 ecommerce-backend
          sleep 10

      - name: Test API
        run: curl http://localhost:3000/products
