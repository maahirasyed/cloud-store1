apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ecommerce-frontend
  template:
    metadata:
      labels:
        app: ecommerce-frontend
    spec:
      containers:
        - name: frontend
          image: ecommerce-frontend:1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-frontend
spec:
  type: NodePort
  selector:
    app: ecommerce-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007
